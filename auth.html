<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GrowUp SMM Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Google Font -->  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      width: 350px;
      padding: 40px;
      border-radius: 22px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      text-align: center;
      box-shadow: 0 15px 50px rgba(0,0,0,0.7);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .logo {
      font-size: 30px;
      font-weight: 600;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #22c55e, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .google-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff4b2b, #ff416c);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .google-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(255,75,43,0.6);
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #64748b;
    }
  </style></head><body>  <div class="card">
    <div class="logo">GrowUp SMM 🚀</div>
    <div class="subtitle">Secure Google Login</div><button class="google-btn" onclick="login()">
  Continue with Google
</button>

<div class="footer">
  Fast • Secure • Trusted
</div>

  </div>  <script>
    function login() {

      var client_id = "933918884194-cq1t4ssi5fg9ii60c13e2d1lstasmlhi.apps.googleusercontent.com";

      var redirect_uri = encodeURIComponent("https://growupsmmofficial.github.io/Grow-Up-Smm/auth.html");

      var scope = encodeURIComponent("email profile");

      var url = "https://accounts.google.com/o/oauth2/v2/auth?" +
        "client_id=" + client_id +
        "&redirect_uri=" + redirect_uri +
        "&response_type=token" +
        "&scope=" + scope +
        "&include_granted_scopes=true" +
        "&prompt=select_account";

      window.location.href = url;
    }
  </script></body>
</html>
