<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GrowUp SMM Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      width: 340px;
      padding: 35px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .google-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .google-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(255,75,43,0.6);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #64748b;
    }
  </style></head><body>  <div class="card">
    <div class="logo">GrowUp SMM 🚀</div>
    <div class="subtitle">Boost Your Social Media</div><button class="google-btn" onclick="login()">
  Continue with Google
</button>

<div class="footer">
  Secure Login • Fast • Trusted
</div>

  </div>  <script>
    function login() {

      var client_id = "933918884194-cq1t4ssi5fg9ii60c13e2d1lstasmlhi.apps.googleusercontent.com";

      var redirect_uri = encodeURIComponent("https://YOUR_USERNAME.github.io/auth.html");

      var scope = encodeURIComponent("email profile");

      var url = "https://accounts.google.com/o/oauth2/v2/auth?" +
        "client_id=" + client_id +
        "&redirect_uri=" + redirect_uri +
        "&response_type=token" +
        "&scope=" + scope +
        "&include_granted_scopes=true";

      window.location.href = url;
    }
  </script></body>
</html>
