<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowUp SMM Login</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  overflow:hidden;
}

body::before, body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  filter:blur(120px);
}

body::before{
  background:radial-gradient(circle,#22c55e55,transparent);
  top:-100px;left:-100px;
}

body::after{
  background:radial-gradient(circle,#06b6d455,transparent);
  bottom:-100px;right:-100px;
}

.card{
  width:350px;
  padding:40px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  box-shadow:0 15px 60px rgba(0,0,0,0.7);
  text-align:center;
  animation:fade 0.8s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

.logo{
  font-size:30px;
  font-weight:600;
  background:linear-gradient(45deg,#22c55e,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}

.subtitle{color:#94a3b8;margin-bottom:30px;}

.google-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ff416c,#ff4b2b);
  color:#fff;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.google-btn:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(255,75,43,0.6);
}

.footer{margin-top:20px;font-size:12px;color:#64748b;}
</style></head><body><div class="card">
  <div class="logo">GrowUp SMM 🚀</div>
  <div class="subtitle">Secure Google Login</div><button class="google-btn" onclick="login()">Continue with Google</button>

  <div class="footer">Fast • Secure • Premium</div>
</div><script>
function login(){
  var client_id="933918884194-cq1t4ssi5fg9ii60c13e2d1lstasmlhi.apps.googleusercontent.com";
  var redirect_uri="https://growupsmmofficial.github.io/Grow-Up-Smm/auth.html";
  var scope="email profile";

  var url="https://accounts.google.com/o/oauth2/v2/auth?" +
    "client_id="+client_id+
    "&redirect_uri="+encodeURIComponent(redirect_uri)+
    "&response_type=token"+
    "&scope="+encodeURIComponent(scope)+
    "&prompt=select_account";

  window.location.href=url;
}

window.onload=function(){
  var url=window.location.href;
  if(url.includes("access_token")){
    var token=url.split("access_token=")[1].split("&")[0];
    window.location.href="https://growupsmmofficial.github.io/Grow-Up-Smm/success.html?token="+token;
  }
};
</script></body>
</html>
