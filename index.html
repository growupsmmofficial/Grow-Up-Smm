<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Selector</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.box{
    width:350px;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
}

h2{
    text-align:center;
}

select,
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
}

button{
    background:#a855f7;
    color:white;
    cursor:pointer;
}

</style>

</head>
<body>

<div class="box">

    <h2>Select Service</h2>

    <select id="category">
        <option value="">Select Category</option>
        <option value="instagram">Instagram</option>
        <option value="youtube">YouTube</option>
    </select>

    <select id="service">
        <option value="">Select Service</option>
    </select>

    <button onclick="goService()">
        Continue
    </button>

</div>

<script>

const services = {

    instagram: [
        {
            name:"Instagram Followers",
            link:"https://example.com/insta-followers"
        },
        {
            name:"Instagram Likes",
            link:"https://example.com/insta-likes"
        }
    ],

    youtube: [
        {
            name:"YouTube Subscribers",
            link:"https://example.com/youtube-subs"
        },
        {
            name:"YouTube Views",
            link:"https://example.com/youtube-views"
        }
    ]

};

const category =
document.getElementById("category");

const service =
document.getElementById("service");

category.addEventListener("change", () => {

    service.innerHTML =
    '<option value="">Select Service</option>';

    const selected =
    services[category.value];

    if(!selected) return;

    selected.forEach(item => {

        service.innerHTML +=
        `<option value="${item.link}">
            ${item.name}
        </option>`;

    });

});

function goService(){

    const link =
    service.value;

    if(!link){

        alert("Select Service");
        return;

    }

    window.location.href = link;

}

</script>

</body>
</html>
